[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Subdomain routing handled by Next.js middleware
# admin.yousell.online → /admin routes
# yousell.online → /dashboard routes (client SaaS)
# Both subdomains served from the same Netlify deployment.
# Configure domain aliases in Netlify dashboard:
#   - admin.yousell.online (primary for admin)
#   - yousell.online (primary for clients)
#   - www.yousell.online (redirect to yousell.online)
